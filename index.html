    </form>
  </div>
  <div id="app">

  <div id="status">Loading feeds…</div>

    function handleLogin(e) {
      e.preventDefault();
      if (document.getElementById("pw").value === "flatplan99") {
        sessionStorage.setItem("feed-health-auth", "1");
        unlock();
      } else {
        document.getElementById("auth-error").textContent = "Incorrect password";
      }
      return false;
    }

    function unlock() {
      document.getElementById("auth-gate").classList.add("hidden");
      document.getElementById("app").style.display = "block";
      loadFeeds();
    }

    if (sessionStorage.getItem("feed-health-auth") === "1") {
      unlock();

    function feedLabel(url) {
      const parts = new URL(url).pathname.replace(/\.rss$/, "").split("/").filter(Boolean);
      return parts.join(" / ");
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      if (isNaN(d)) return dateStr;
      return d.toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })
        + " " + d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });
    }

    const tbody = document.getElementById("results");

    const statusEl = document.getElementById("status");
    let loaded = 0;
    statusEl.textContent = `Loading 0 / ${FEEDS.length} feeds…`;

    function updateStatus() {
      loaded++;
      if (loaded < FEEDS.length) {
        statusEl.textContent = `Loading ${loaded} / ${FEEDS.length} feeds…`;
      } else {
        statusEl.textContent = `All ${FEEDS.length} feeds loaded.`;
      }
    }

    // Render placeholder rows
    FEEDS.forEach(url => {
      const tr = document.createElement("tr");
      tr.id = "row-" + encodeURIComponent(url);
      tr.innerHTML =
        `<td class="feed-name">${feedLabel(url)}</td>` +
        `<td class="loading">—</td>` +
        `<td></td>`;
      tbody.appendChild(tr);
    });

    // Fetch all feeds in parallel
    FEEDS.forEach(async (url) => {
      const row = document.getElementById("row-" + encodeURIComponent(url));
      try {
        const res = await fetch("/api/feed?url=" + encodeURIComponent(url));
        const text = await res.text();
        const xml = new DOMParser().parseFromString(text, "application/xml");

        const item = xml.querySelector("item");
        if (!item) {
          row.children[1].innerHTML = '<span class="error">No items</span>';
          updateStatus();
          return;
        }

        const title = item.querySelector("title")?.textContent ?? "Untitled";
        const pubDate = item.querySelector("pubDate")?.textContent ?? "";
        const pubTime = new Date(pubDate).getTime();
        const isStale = pubDate && (Date.now() - pubTime > 48 * 60 * 60 * 1000);

        if (isStale) row.classList.add("stale");
        row.dataset.timestamp = pubTime || 0;

        row.children[1].innerHTML = `<span class="item-title">${title}</span>`;
        row.children[2].innerHTML = `<span class="item-date">${pubDate ? formatDate(pubDate) : "—"}</span>`;
      } catch (err) {
        row.children[1].innerHTML = `<span class="error">Error: ${err.message}</span>`;
        row.dataset.timestamp = 0;
      }
      updateStatus();
    });

    // Sort by publish date
    let sortDir = 0; // 0 = unsorted, 1 = asc (oldest first), -1 = desc (newest first)
    const sortBtn = document.getElementById("sort-date");

    sortBtn.addEventListener("click", () => {
      sortDir = sortDir === 1 ? -1 : 1;
      sortBtn.classList.toggle("sort-asc", sortDir === 1);
      sortBtn.classList.toggle("sort-desc", sortDir === -1);

      const rows = Array.from(tbody.querySelectorAll("tr"));
      rows.sort((a, b) => {
        const ta = Number(a.dataset.timestamp) || 0;
        const tb = Number(b.dataset.timestamp) || 0;
        return sortDir === 1 ? ta - tb : tb - ta;
      });
      rows.forEach(r => tbody.appendChild(r));
    });
    }
  </script>
</body>
